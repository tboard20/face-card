<!DOCTYPE html>
<html>
<head>
    <title>Beginner Profile Card</title>
    <style>
        /* CSS stays here */
        body {
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding-top: 100px;
            font-family: sans-serif;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
            border: 1px solid #ddd;
        }
        input {
            width: 90%;
            padding: 10px;
            margin-top: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #enter-btn {
            margin-top: 15px;
            background-color: #28a745;
            color: white;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="name-display">Type your name...</h2>
        <p>Beginner Coder</p>
        
        <input type="text" id="name-input" placeholder="Start typing...">
        <button id="enter-btn">Enter</button>
    </div>

    <script>
        // JAVASCRIPT Logic
        const nameInput = document.getElementById('name-input');
        const nameDisplay = document.getElementById('name-display');
        const enterBtn = document.getElementById('enter-btn');

        // This function runs every time you type
        nameInput.addEventListener('input', function() {
            const val = nameInput.value;
            
            // 1. Update the name on the card
            if (val.length > 0) {
                nameDisplay.innerText = val;
                enterBtn.style.display = "block"; // 2. Show button
            } else {
                nameDisplay.innerText = "Type your name...";
                enterBtn.style.display = "none";  // 3. Hide button
            }
        });

        // When you click Enter
        enterBtn.addEventListener('click', function() {
            alert("Hello " + nameInput.value + "!");
        });
    </script>

</body>
</html>
