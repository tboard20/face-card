<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Simple Weather</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>SkyCast</h1>
            <p>Check the weather anywhere</p>
        </header>

        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name (e.g. London)...">
            <button id="search-btn">Search</button>
        </div>

        <div id="weather-card" class="weather-card hidden">
            <div class="city-name" id="display-city">City Name</div>
            <div class="temp" id="display-temp">--°C</div>
            <div class="description" id="display-desc">Weather Description</div>
            
            <div class="weather-details">
                <div class="detail">
                    <span class="label">Wind</span>
                    <span id="display-wind">-- km/h</span>
                </div>
                <div class="detail">
                    <span class="label">Humidity</span>
                    <span id="display-humidity">--%</span>
                </div>
            </div>
        </div>

        <div id="error-message" class="error hidden">
            Oops! We couldn't find that city. Please try again.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
